services:
  postgres:
    image: postgres:17
    container_name: navisow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: navisow_docusign
      POSTGRES_USER: navisow
      POSTGRES_PASSWORD: navisow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: navisow-keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8090:8080"

volumes:
  postgres-data:
