server:
  port: ${APP_ADVANCED_PORT:8081}

spring:
  application:
    name: docusign-backend-advanced
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8090/realms/navisow}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:navisow_docusign}
    username: ${POSTGRES_USER:navisow}
    password: ${POSTGRES_PASSWORD:navisow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    table: flyway_schema_history_advanced

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

app:
  docusign:
    base-path: ${DOCUSIGN_BASE_PATH:https://demo.docusign.net/restapi}
    auth-server: ${DOCUSIGN_AUTH_SERVER:account-d.docusign.com}
    client-id: ${DOCUSIGN_CLIENT_ID:${DOCUSIGN_INTEGRATION_KEY:}}
    client-secret: ${DOCUSIGN_CLIENT_SECRET:}
    redirect-uri: ${DOCUSIGN_REDIRECT_URI:http://localhost:5173/auth/docusign/callback}
    webhook-secret: ${DOCUSIGN_WEBHOOK_SECRET:}
